# ============================================================
#  .github/workflows/terraform.yml
#
#  HOW THIS PIPELINE WORKS (beginner-friendly):
#
#  State is stored in S3. Every run:
#    Init  → Terraform downloads current state from S3
#    Plan  → compares S3 state (what exists in AWS) vs tfvars (what you want)
#             Same config as last run → "No changes. Infrastructure is up-to-date."
#             Something changed       → shows exactly what will be added/changed
#    Apply → applies only the difference, saves new state back to S3
#
#  No git commits. No terraform import. No instance_id tracking.
#  Terraform handles all of this automatically via S3 state.
#
#  ─────────────────────────────────────────────────────────────
#  ONE-TIME SETUP – Run these AWS CLI commands once before first run:
#
#  1. Create S3 bucket (replace with your unique bucket name):
#     aws s3api create-bucket \
#       --bucket terraform-state-bucket-prasamjain \
#       --region us-east-1
#
#  2. Enable versioning on the bucket:
#     aws s3api put-bucket-versioning \
#       --bucket terraform-state-bucket-prasamjain \
#       --versioning-configuration Status=Enabled
#
#  3. Create DynamoDB table for state locking:
#     aws dynamodb create-table \
#       --table-name terraform-state-lock \
#       --attribute-definitions AttributeName=LockID,AttributeType=S \
#       --key-schema AttributeName=LockID,KeyType=HASH \
#       --billing-mode PAY_PER_REQUEST \
#       --region us-east-1
#
#  4. Add GitHub Secrets (Repo → Settings → Secrets → Actions):
#     AWS_ACCESS_KEY_ID      → your AWS access key
#     AWS_SECRET_ACCESS_KEY  → your AWS secret key
#
#  5. Update the bucket name in main.tf backend block to match step 1.
# ============================================================

name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest

    steps:

      # ── Step 1: Checkout code ─────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Install Terraform ─────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # ── Step 3: Connect to AWS ────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── Step 4: Terraform Init ────────────────────────────
      # Downloads the current tfstate from S3 automatically.
      # Every run starts with the real current state of your AWS infra.
      - name: Terraform Init
        run: terraform init

      # ── Step 5: Format Check ──────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Step 6: Validate ──────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Step 7: Terraform Plan ────────────────────────────
      # Compares S3 state (current AWS infra) vs terraform.tfvars.json (desired).
      #
      # Exit codes:
      #   0 = No changes  → EC2 already matches your config, nothing to do
      #   1 = Error        → Something is wrong with your config
      #   2 = Has changes  → Something is different, apply will run
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan \
            -var-file=terraform.tfvars.json \
            -out=tfplan \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=no_changes" >> $GITHUB_OUTPUT
            echo "✅ No changes – EC2 is already up to date."
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "result=has_changes" >> $GITHUB_OUTPUT
            echo "⚠️  Changes detected – apply will run."
          else
            echo "❌ Terraform plan failed."
            exit 1
          fi

      # ── Step 8: Terraform Apply ───────────────────────────
      # Only runs when:
      #   a) this is a push to main (not a PR)
      #   b) plan found actual changes to make
      #
      # After apply, Terraform automatically uploads the new state to S3.
      # Next pipeline run will read this updated state → correctly shows
      # "No changes" if you re-run without changing anything.
      - name: Terraform Apply
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          steps.plan.outputs.result == 'has_changes'
        run: |
          terraform apply -auto-approve tfplan
          echo "✅ Apply complete. New state saved to S3 automatically."

      # ── Step 9: Show Outputs ──────────────────────────────
      - name: Show Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "──────────────────────────────"
          echo "  EC2 Instance Details"
          echo "──────────────────────────────"
          terraform output
          echo "──────────────────────────────"
